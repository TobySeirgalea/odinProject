<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Items sold summary</title>
    <link href="../minimal-table.css" rel="stylesheet" type="text/css">
  </head>

<body>
    <h1>Items sold summary</h1>

    <table>
      <caption>Items Sold August 2016</caption>
      <thead>
        <tr>
          <td colspan="2" rowspan="2"></td>
          <th colspan="3" id="Clothes">Clothes</th>
          <th colspan="2" id="Accessories" >Accessories</th>
        </tr>
        <tr>
          <th id="Trousers" headers="Clothes">Trousers</th>
          <th id="Skirts" headers="Clothes">Skirts</th>
          <th id="Dresses" headers="Clothes">Dresses</th>
          <th id="Bracelets" headers="Accesories">Bracelets</th>
          <th id="Rings" headers="Accesories">Rings</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th rowspan="3" id="Belgium" >Belgium</th>
          <th id="Antwerp" headers="Belgium">Antwerp</th>
          <td headers="Clothes Trousers Belgium Antwerp">56</td>
          <td headers="Clothes Skirts Belgium Antwerp">22</td>
          <td headers="Clothes Dresses Belgium Antwerp">43</td>
          <td headers="Accesories Bracelets Belgium Antwerp">72</td>
          <td headers="Accesories Rings Belgium Antwerp">23</td>
        </tr>
        <tr>
          <th id="Ghent" headers="Belgium">Ghent</th>
          <td headers="Clothes Trousers Belgium Ghent">46</td>
          <td headers="Clothes Skirts Belgium Ghent">18</td>
          <td headers="Clothes Dresses Belgium Ghent">50</td>
          <td headers="Accesories Bracelets Belgium Ghent">61</td>
          <td headers="Accesories Rings Belgium Ghent">15</td>
        </tr>
        <tr>
          <th id="Brussels" headers="Belgium">Brussels</th>
          <td headers="Clothes Trousers Belgium Brussels" >51</td>
          <td headers="Clothes Skirts Belgium Brussels">27</td>
          <td headers="Clothes Dresses Belgium Brussels">38</td>
          <td headers="Accesories Bracelets Belgium Brussels">69</td>
          <td headers="Accesories Rings Belgium Brussels">28</td>
        </tr>
        <tr>
          <th rowspan="2" id="Netherlands">The Netherlands</th>
          <th id="Amsterdam" headers="Netherlands">Amsterdam</th>
          <td headers="Clothes Trousers Netherlands Amsterdam">89</td>
          <td headers="Clothes Skirts Netherlands Amsterdam">34</td>
          <td headers="Clothes Dresses Netherlands Amsterdam">69</td>
          <td headers="Accesories Bracelets Netherlands Amsterdam">85</td>
          <td headers="Accesories Rings Netherlands Amsterdam">38</td>
        </tr>
        <tr>
          <th id="Utrecht" headers="Netherlands">Utrecht</th>
          <td headers="Clothes Trousers Netherlands Utrecht">80</td>
          <td headers="Clothes Skirts Netherlands Utrecht">12</td>
          <td headers="Clothes Dresses Netherlands Utrecht">43</td>
          <td headers="Accesories Bracelets Netherlands Utrecht">36</td>
          <td headers="Accesories Rings Netherlands Utrecht">19</td>
        </tr>
      </tbody>
    </table>
</body>
</html>

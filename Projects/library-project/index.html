<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
    <title>Library</title>
</head>
<body>
    <dialog id="addBookDialog" closedBy="any">
        <form action="" method="dialog" id="addBookForm">
            <label for="bookTitleInput">Title:</label>
            <input type="text" name="bookTitle" id="bookTitleInput">

            <label for="bookAuthorInput">Author:</label>
            <input type="text" name="bookAuthor" id="bookAuthorInput">

            <label for="pagesNumberInput">Number of pages:</label>
            <input type="number" name="pages" id="pagesNumberInput">

            <label for="readCheckbox">Read:</label>
            <input type="checkbox" value="read" checked id="readCheckbox">
        </form>
        <button type="submit" id="sendFormButton">Add</button>
        <button id="cancelFormButton">Cancel</button>
    </dialog>


    <button id="addBookButton">Add book</button>
</body>
</html>
